<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battleship PvP - Tactical Command AI</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --water: #0ea5e9;
            --ship: #94a3b8;
            --hit: #ef4444;
            --miss: #f8fafc;
            --accent: #10b981;
            --grid-line: #334155;
            --cell-size: 35px;
            --ai-gold: #fbbf24;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* UI Headers */
        #header {
            text-align: center;
            margin-bottom: 30px;
            background: var(--card);
            padding: 20px 40px;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            max-width: 650px;
            width: 100%;
        }

        h1 { margin: 0 0 10px 0; font-size: 1.5rem; letter-spacing: 1px; color: var(--water); }
        #status { font-size: 1.1rem; margin-bottom: 15px; min-height: 1.5em; font-weight: 500; }
        
        #ai-comms {
            background: #00000044;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.9rem;
            color: var(--accent);
            border-left: 3px solid var(--accent);
            min-height: 40px;
        }

        /* Game Boards */
        .game-world {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .board-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .board-title {
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, var(--cell-size));
            grid-template-rows: repeat(10, var(--cell-size));
            gap: 1px;
            background-color: var(--grid-line);
            border: 4px solid var(--grid-line);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            background-color: var(--water);
            cursor: pointer;
            position: relative;
            transition: all 0.15s ease;
        }

        .cell:hover {
            filter: brightness(1.3);
            z-index: 2;
        }

        .cell.ship { background-color: var(--ship); }
        
        .cell.hit { background-color: var(--hit); }
        .cell.hit::before, .cell.hit::after {
            content: '';
            position: absolute;
            width: 70%; height: 2px;
            background: white;
            top: 50%; left: 15%;
            transform: rotate(45deg);
        }
        .cell.hit::after { transform: rotate(-45deg); }

        .cell.miss { background-color: var(--miss); }
        .cell.miss::after {
            content: '';
            position: absolute;
            width: 8px; height: 8px;
            background: var(--bg);
            border-radius: 50%;
            top: calc(50% - 4px);
            left: calc(50% - 4px);
        }

        /* AI Suggestion Highlight */
        .cell.ai-suggest {
            box-shadow: inset 0 0 10px var(--ai-gold);
            outline: 2px solid var(--ai-gold);
            z-index: 10;
        }

        /* Turn Management */
        .active-player { transform: scale(1.05); }
        .inactive-player { opacity: 0.3; pointer-events: none; filter: grayscale(0.8); }

        /* Buttons */
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            font-size: 0.85rem;
        }
        .btn:hover { transform: translateY(-2px); background: #059669; }
        .btn.ai-btn { background: var(--ai-gold); color: #000; }
        .btn.ai-btn:hover { background: #d97706; }
        .btn.hidden { display: none; }

        /* Overlay */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            text-align: center;
        }

        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--ai-gold);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none !important; }

        @media (max-width: 800px) {
            :root { --cell-size: 30px; }
            .game-world { gap: 20px; }
        }
    </style>
</head>
<body>

    <div id="header">
        <h1>BATTLESHIP: COMMAND CENTER</h1>
        <div id="status">Player 1: Place 5 ship segments</div>
        <div id="ai-comms">System Online. Awaiting fleet deployment.</div>
        
        <div class="controls">
            <button id="action-btn" class="btn">Confirm Placement</button>
            <button id="intel-btn" class="btn ai-btn hidden">✨ AI Intel Suggestion</button>
        </div>
    </div>

    <div class="game-world">
        <div class="board-wrap" id="p1-wrap">
            <div class="board-title">Fleet 01</div>
            <div id="p1-board" class="grid"></div>
        </div>

        <div class="board-wrap" id="p2-wrap">
            <div class="board-title">Fleet 02</div>
            <div id="p2-board" class="grid"></div>
        </div>
    </div>

    <div id="overlay" class="hidden">
        <h2 id="overlay-msg">Hand the device to Player 2</h2>
        <button class="btn" onclick="confirmReady()">I Am Ready</button>
    </div>

    <script>
        const apiKey = ""; // Runtime provides the key
        const p1Board = document.getElementById('p1-board');
        const p2Board = document.getElementById('p2-board');
        const statusText = document.getElementById('status');
        const aiComms = document.getElementById('ai-comms');
        const actionBtn = document.getElementById('action-btn');
        const intelBtn = document.getElementById('intel-btn');
        const overlay = document.getElementById('overlay');
        const overlayMsg = document.getElementById('overlay-msg');

        let gameState = 'p1-setup'; 
        let currentPlayer = 1;
        let p1Hits = 0;
        let p2Hits = 0;
        const SHIPS_REQUIRED = 5;

        // Gemini API Helper
        async function callGemini(prompt, systemPrompt = "You are a tactical naval AI.") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            let retries = 0;
            const maxRetries = 5;
            
            while (retries <= maxRetries) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: prompt }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] }
                        })
                    });
                    
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "Communication disrupted.";
                } catch (error) {
                    if (retries === maxRetries) return "AI tactical systems offline.";
                    const delay = Math.pow(2, retries) * 1000;
                    await new Promise(resolve => setTimeout(resolve, delay));
                    retries++;
                }
            }
        }

        // Feature 1: ✨ AI Radio Transmissions
        async function updateAIComms(eventDescription) {
            aiComms.innerHTML = `Scanning frequencies... <div class="loader"></div>`;
            const prompt = `The current event in our battleship game is: ${eventDescription}. 
            Provide a very short, gritty, thematic radio transmission (max 15 words) from a naval commander. 
            Do not use markdown.`;
            
            const message = await callGemini(prompt, "You are a grit-hardened naval fleet commander in a high-stakes war. Be brief and atmospheric.");
            aiComms.innerText = `> ${message}`;
        }

        // Feature 2: ✨ AI Tactical Intel
        intelBtn.addEventListener('click', async () => {
            intelBtn.disabled = true;
            intelBtn.innerHTML = `✨ Scanning... <div class="loader"></div>`;
            
            const enemyBoard = currentPlayer === 1 ? p2Board : p1Board;
            const cells = Array.from(enemyBoard.querySelectorAll('.cell'));
            
            // Collect board state for Gemini
            const boardState = cells.map((c, i) => {
                if (c.classList.contains('hit')) return 'H';
                if (c.classList.contains('miss')) return 'M';
                return 'W'; // Unknown Water
            });

            const prompt = `Here is a 10x10 battleship grid (represented as a 100-item array: H=Hit, M=Miss, W=Water). 
            Identify the single best index (0-99) to strike next to find a ship. 
            Favor indices adjacent to existing Hits 'H' but avoid Misses 'M'. 
            Return ONLY the index as a number.
            Grid: ${JSON.stringify(boardState)}`;

            const suggestedIndex = await callGemini(prompt, "You are a tactical strategy AI. Return ONLY a single integer between 0 and 99.");
            const idx = parseInt(suggestedIndex.trim().match(/\d+/)?.[0]);

            if (!isNaN(idx) && idx >= 0 && idx < 100) {
                const target = cells[idx];
                target.classList.add('ai-suggest');
                setTimeout(() => target.classList.remove('ai-suggest'), 3000);
                updateAIComms(`The AI Intelligence suggests striking at sector ${idx}.`);
            }

            intelBtn.disabled = false;
            intelBtn.innerHTML = `✨ AI Intel Suggestion`;
        });

        function init() {
            createCells(p1Board, 1);
            createCells(p2Board, 2);
            updateBoardVisibilty();
        }

        function createCells(board, playerNum) {
            for (let i = 0; i < 100; i++) {
                const cell = document.createElement('div');
                cell.classList.add('cell');
                cell.dataset.index = i;
                cell.addEventListener('click', () => onCellClick(playerNum, cell));
                board.appendChild(cell);
            }
        }

        async function onCellClick(playerNum, cell) {
            if (gameState === 'p1-setup' && playerNum === 1) {
                cell.classList.toggle('ship');
                const count = p1Board.querySelectorAll('.ship').length;
                statusText.innerText = `Player 1: ${count}/${SHIPS_REQUIRED} segments placed`;
            } 
            else if (gameState === 'p2-setup' && playerNum === 2) {
                cell.classList.toggle('ship');
                const count = p2Board.querySelectorAll('.ship').length;
                statusText.innerText = `Player 2: ${count}/${SHIPS_REQUIRED} segments placed`;
            }
            else if (gameState === 'combat') {
                if (currentPlayer === 1 && playerNum === 2) {
                    handleAttack(cell, 1);
                } else if (currentPlayer === 2 && playerNum === 1) {
                    handleAttack(cell, 2);
                }
            }
        }

        async function handleAttack(cell, attacker) {
            if (cell.classList.contains('hit') || cell.classList.contains('miss')) return;

            if (cell.classList.contains('ship')) {
                cell.classList.add('hit');
                if (attacker === 1) p1Hits++; else p2Hits++;
                statusText.innerText = "DIRECT HIT!";
                updateAIComms("We have confirmed a direct hit on an enemy vessel!");
                checkWin();
            } else {
                cell.classList.add('miss');
                statusText.innerText = "MISS.";
                updateAIComms("Shells dropped in open water. No contact.");
                setTimeout(showTransitionOverlay, 1500);
            }
        }

        function checkWin() {
            if (p1Hits === SHIPS_REQUIRED || p2Hits === SHIPS_REQUIRED) {
                const winner = p1Hits === SHIPS_REQUIRED ? 1 : 2;
                statusText.innerText = `VICTORY! COMMANDER ${winner} DESTROYED THE FLEET!`;
                gameState = 'game-over';
                updateAIComms(`Total victory achieved by Fleet ${winner}. Enemy neutralized.`);
                p1Board.parentElement.classList.add('inactive-player');
                p2Board.parentElement.classList.add('inactive-player');
                intelBtn.classList.add('hidden');
            }
        }

        actionBtn.addEventListener('click', () => {
            if (gameState === 'p1-setup') {
                if (p1Board.querySelectorAll('.ship').length !== SHIPS_REQUIRED) return;
                gameState = 'p2-setup';
                statusText.innerText = `Player 2: Place ${SHIPS_REQUIRED} ship segments`;
                maskShips(p1Board);
                updateBoardVisibilty();
                updateAIComms("Player 1 fleet deployed. Awaiting Player 2 coordinates.");
            } 
            else if (gameState === 'p2-setup') {
                if (p2Board.querySelectorAll('.ship').length !== SHIPS_REQUIRED) return;
                maskShips(p2Board);
                gameState = 'combat';
                actionBtn.classList.add('hidden');
                intelBtn.classList.remove('hidden');
                showTransitionOverlay();
            }
        });

        function showTransitionOverlay() {
            if (gameState === 'game-over') return;
            overlayMsg.innerText = `Next Turn: Commander ${currentPlayer === 1 ? 2 : 1}`;
            overlay.classList.remove('hidden');
        }

        function confirmReady() {
            if (gameState === 'combat') {
                currentPlayer = currentPlayer === 1 ? 2 : 1;
            }
            overlay.classList.add('hidden');
            updateBoardVisibilty();
            statusText.innerText = `Player ${currentPlayer}: Launch your attack!`;
        }

        function updateBoardVisibilty() {
            const p1Wrap = document.getElementById('p1-wrap');
            const p2Wrap = document.getElementById('p2-wrap');

            if (gameState === 'p1-setup') {
                p1Wrap.className = 'board-wrap active-player';
                p2Wrap.className = 'board-wrap inactive-player';
            } else if (gameState === 'p2-setup') {
                p1Wrap.className = 'board-wrap inactive-player';
                p2Wrap.className = 'board-wrap active-player';
            } else if (gameState === 'combat') {
                p1Wrap.className = 'board-wrap active-player';
                p2Wrap.className = 'board-wrap active-player';
                if (currentPlayer === 1) {
                    p1Wrap.style.pointerEvents = 'none';
                    p2Wrap.style.pointerEvents = 'auto';
                } else {
                    p2Wrap.style.pointerEvents = 'none';
                    p1Wrap.style.pointerEvents = 'auto';
                }
            }
        }

        function maskShips(board) {
            const ships = board.querySelectorAll('.ship');
            ships.forEach(s => s.style.backgroundColor = 'var(--water)');
        }

        init();
    </script>
</body>
</html>
