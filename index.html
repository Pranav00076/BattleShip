<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PvP Battleship</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="ui">
        <h2 id="status">Player 1: Place your ships</h2>
        <button id="action-btn">Finish Placement</button>
    </div>

    <div class="game-area">
        <div class="board-wrapper">
            <h3>Player 1</h3>
            <div id="p1-board" class="grid"></div>
        </div>
        
        <div class="board-wrapper">
            <h3>Player 2</h3>
            <div id="p2-board" class="grid"></div>
        </div>
    </div>

    <div id="overlay" class="hidden">
        <div class="overlay-content">
            <h1 id="overlay-msg">Next Player's Turn</h1>
            <button onclick="revealBoard()">I'm Ready</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
